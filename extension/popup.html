<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Medullo</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <div class="dot" id="status-dot" aria-hidden="true"></div>
        <h1>Medullo</h1>
      </header>

      <p class="tagline">A quiet second working memory.</p>

      <section class="rows">
        <div class="row clickable" id="backend-row" title="Click to change backend URL">
          <span class="label">Backend</span>
          <span class="value" id="backend-url">—</span>
        </div>
        <div class="row">
          <span class="label">Account</span>
          <span class="value" id="account">—</span>
        </div>
        <div class="row">
          <span class="label">Queued</span>
          <span class="value" id="queued">—</span>
        </div>
        <div class="row">
          <span class="label">Sent</span>
          <span class="value" id="sent">—</span>
        </div>
        <div class="row">
          <span class="label">Last flush</span>
          <span class="value" id="last-flush">—</span>
        </div>
      </section>

      <p class="error" id="error" hidden></p>

      <section id="settings" class="settings" hidden>
        <label class="settings-label" for="backend-url-input">Backend URL</label>
        <input
          id="backend-url-input"
          type="url"
          placeholder="https://your-backend.example.com"
          autocomplete="off"
          spellcheck="false"
        />
        <p class="settings-help">
          Self-host? Point this at your backend. Default is
          <code>http://localhost:8000</code>.
        </p>
        <div class="settings-actions">
          <button id="settings-save">Save</button>
          <button id="settings-cancel" class="ghost">Cancel</button>
        </div>
      </section>

      <div class="actions">
        <button id="flush">Flush now</button>
        <button id="copy-token" class="ghost">Copy token</button>
        <button id="reset" class="ghost">New session</button>
      </div>

      <footer>Cognitive continuity · v0.1</footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
